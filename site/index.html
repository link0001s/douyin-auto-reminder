<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音违约监测台</title>
    <meta
      name="description"
      content="输入抖音号与通知邮箱，保存基准状态，刷新检测是否违约（未更新）。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="wrap">
      <section class="hero reveal">
        <p class="kicker">DOUYIN BREACH MONITOR</p>
        <h1>违约监测台</h1>
        <p class="desc">
          只保留你要的核心动作：输入抖音号、输入通知邮箱、保存状态、刷新状态。
        </p>
      </section>

      <section class="panel reveal delay-1">
        <div class="panel-head">
          <h2>监测设置</h2>
          <span id="statusPill" class="pill idle">待初始化</span>
        </div>

        <form id="monitorForm" class="grid" autocomplete="off">
          <label class="field full">
            <span>抖音号 / 抖音主页链接</span>
            <input
              id="douyinInput"
              type="text"
              placeholder="例如: MS4wLjAB... 或 https://www.douyin.com/user/..."
              required
            />
          </label>

          <label class="field">
            <span>违约通知邮箱</span>
            <input id="noticeEmail" type="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>违约阈值（小时）</span>
            <input id="breachHours" type="number" min="1" value="24" required />
          </label>
        </form>

        <div class="actions">
          <button id="saveBtn" class="btn solid" type="button">保存状态</button>
          <button id="refreshBtn" class="btn ghost" type="button">刷新状态</button>
        </div>

        <p class="tip">
          说明：页面会优先尝试自动抓取最新视频 ID；若抓取失败，会提示你手动再次刷新或更换抖音主页链接。
        </p>
      </section>

      <section class="stats reveal delay-2">
        <article class="stat-card">
          <p class="title">当前基准视频</p>
          <p id="baselineVideo" class="value">未保存</p>
          <p id="baselineTime" class="meta">-</p>
        </article>

        <article class="stat-card">
          <p class="title">最近检测</p>
          <p id="latestResult" class="value">未检测</p>
          <p id="latestTime" class="meta">-</p>
        </article>

        <article class="stat-card">
          <p class="title">通知邮箱</p>
          <p id="emailView" class="value">-</p>
          <p class="meta">违约时发送提醒</p>
        </article>
      </section>

      <section class="panel reveal delay-3">
        <div class="panel-head">
          <h2>运行日志</h2>
        </div>
        <pre id="logBox" class="log">[系统] 页面已就绪</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
