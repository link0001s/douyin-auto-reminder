<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音更新检测台</title>
    <meta
      name="description"
      content="输入抖音号与通知邮箱，保存状态，按 7/15/30 天规则检测是否违约并发送提醒。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <main class="wrap">
      <section class="hero reveal">
        <div class="hero-head">
          <p class="kicker">LINK'S UPDATE MONITOR</p>
          <span id="statusPill" class="pill idle">待初始化</span>
        </div>
        <h1>抖音更新检测台</h1>
        <p class="desc">
          规则固定：7天7条、15天15条、30天30条。到期后如果没点检测，或检测不达标，立即触发邮件提醒。
        </p>

        <div class="mascot-row" aria-hidden="true">
          <div class="mascot-card">
            <svg viewBox="0 0 64 64" class="icon-svg" role="img" aria-label="wrench">
              <circle cx="32" cy="32" r="30" fill="#1d2430" stroke="#38465f" stroke-width="2" />
              <path
                d="M41 17a9 9 0 0 0-9.6 12.4L19.5 41.3a4.2 4.2 0 1 0 5.9 5.9l11.8-11.8A9 9 0 0 0 47 25.8l-5.2 2.3-3.9-3.9Z"
                fill="#78d6ff"
              />
              <circle cx="22.3" cy="44.4" r="1.8" fill="#0f131b" />
            </svg>
            <span>小扳手巡检</span>
          </div>

          <div class="mascot-card">
            <svg viewBox="0 0 64 64" class="icon-svg" role="img" aria-label="robot">
              <circle cx="32" cy="32" r="30" fill="#1d2430" stroke="#38465f" stroke-width="2" />
              <rect x="18" y="19" width="28" height="26" rx="8" fill="#81ffb6" />
              <rect x="21" y="22" width="22" height="14" rx="4" fill="#112018" opacity="0.36" />
              <circle cx="26" cy="29" r="3" fill="#0f131b" />
              <circle cx="38" cy="29" r="3" fill="#0f131b" />
              <rect x="25" y="37" width="14" height="3.4" rx="1.7" fill="#0f131b" />
              <rect x="30.5" y="13" width="3" height="7" rx="1.5" fill="#81ffb6" />
              <circle cx="32" cy="12" r="2.1" fill="#ff8f5a" />
            </svg>
            <span>小机器人提醒</span>
          </div>
        </div>
      </section>

      <section class="panel reveal delay-1">
        <div class="panel-head">
          <h2>监测设置</h2>
        </div>

        <form id="monitorForm" class="grid" autocomplete="off">
          <label class="field full">
            <span>抖音号 / 抖音主页链接</span>
            <input
              id="douyinInput"
              type="text"
              placeholder="例如: MS4wLjAB... 或 https://www.douyin.com/user/..."
              required
            />
          </label>

          <label class="field">
            <span>违约通知邮箱</span>
            <input id="noticeEmail" type="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>规则周期</span>
            <select id="rulePlan">
              <option value="7">7天7条</option>
              <option value="15">15天15条</option>
              <option value="30" selected>30天30条</option>
            </select>
          </label>
        </form>

        <div class="actions">
          <button id="saveBtn" class="btn solid" type="button">保存状态</button>
          <button id="refreshBtn" class="btn ghost" type="button">点检测 / 刷新状态</button>
        </div>

        <div id="alertBox" class="alert hidden">
          <p id="alertText">违约提醒</p>
          <a id="alertMailLink" href="#" target="_blank" rel="noreferrer">手动发送邮件</a>
        </div>

        <p class="hint">说明：保存后配置会锁定，但“点检测”可以随时执行。</p>
      </section>

      <section class="stats reveal delay-2">
        <article class="stat-card">
          <p class="title">当前周期</p>
          <p id="cycleView" class="value">30天30条</p>
          <p id="dueTime" class="meta">到期时间：-</p>
        </article>

        <article class="stat-card">
          <p class="title">视频更新状态</p>
          <p id="progressCount" class="value">未检测</p>
          <p id="latestTime" class="meta">最近检测：-</p>
        </article>

        <article class="stat-card">
          <p class="title">通知邮箱</p>
          <p id="emailView" class="value">-</p>
          <p id="latestResult" class="meta">状态：待初始化</p>
        </article>
      </section>

      <section class="panel reveal delay-3">
        <div class="panel-head">
          <h2>运行日志</h2>
        </div>
        <pre id="logBox" class="log">[系统] 页面已就绪</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
