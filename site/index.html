<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音更新检测台</title>
    <meta
      name="description"
      content="输入抖音号与通知邮箱，保存状态，按 7/15/30 天规则检测是否违约并发送提醒。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>
    <div class="side-stack left" aria-hidden="true">
      <div class="side-chip tone-a">
        <svg viewBox="0 0 64 64" role="img" aria-label="wrench">
          <path
            d="M40.5 13.5a10.4 10.4 0 0 0-11.8 13.6L16.8 39a5.2 5.2 0 1 0 7.4 7.4l11.8-11.8a10.4 10.4 0 0 0 12-11.1l-5.8 2.5-4.7-4.7z"
            fill="#72deff"
          />
          <circle cx="20.4" cy="42.9" r="2.2" fill="#08101a" />
        </svg>
      </div>
      <div class="side-chip tone-c">
        <svg viewBox="0 0 64 64" role="img" aria-label="gear">
          <path
            d="M29.7 10h4.6l1.1 5.4a16.7 16.7 0 0 1 4.4 1.9l4.8-2.8 3.2 3.2-2.8 4.8a16.7 16.7 0 0 1 1.9 4.4L52 28v4.6l-5.4 1.1a16.7 16.7 0 0 1-1.9 4.4l2.8 4.8-3.2 3.2-4.8-2.8a16.7 16.7 0 0 1-4.4 1.9L34.3 50h-4.6l-1.1-5.4a16.7 16.7 0 0 1-4.4-1.9l-4.8 2.8-3.2-3.2 2.8-4.8a16.7 16.7 0 0 1-1.9-4.4L12 32.6V28l5.4-1.1a16.7 16.7 0 0 1 1.9-4.4l-2.8-4.8 3.2-3.2 4.8 2.8a16.7 16.7 0 0 1 4.4-1.9z"
            fill="#ff9f66"
          />
          <circle cx="32" cy="30.3" r="7.3" fill="#08101a" />
        </svg>
      </div>
      <div class="side-chip tone-b">
        <svg viewBox="0 0 64 64" role="img" aria-label="antler">
          <path
            d="M18 49V28c0-8.4 4.8-13.6 14-13.6h2V19h-2c-6 0-9 3.1-9 9v21z"
            fill="#8fffa5"
          />
          <path
            d="M46 49V28c0-5.9-3-9-9-9h-2v-4.6h2c9.2 0 14 5.2 14 13.6v21z"
            fill="#8fffa5"
          />
          <path d="M23 25h8v3.4h-8zm0 7h9v3.4h-9zm22-7h-8v3.4h8zm-22 14h10v3.4H23zm22 0h-10v3.4h10z" fill="#8fffa5" />
        </svg>
      </div>
    </div>
    <div class="side-stack right" aria-hidden="true">
      <div class="side-chip tone-b">
        <svg viewBox="0 0 64 64" role="img" aria-label="robot">
          <rect x="17" y="18" width="30" height="28" rx="8" fill="#81ffb6" />
          <rect x="21" y="22" width="22" height="14" rx="4" fill="#102218" opacity="0.4" />
          <circle cx="27.5" cy="29" r="3" fill="#0d131a" />
          <circle cx="36.5" cy="29" r="3" fill="#0d131a" />
          <rect x="25.5" y="37" width="13" height="3.4" rx="1.7" fill="#0d131a" />
          <rect x="30.5" y="12" width="3" height="7" rx="1.5" fill="#81ffb6" />
          <circle cx="32" cy="11.2" r="2.2" fill="#ff965f" />
        </svg>
      </div>
      <div class="side-chip tone-d">
        <svg viewBox="0 0 64 64" role="img" aria-label="wolf head">
          <path d="M12 24l10-9 10 7 10-7 10 9-3 23H15z" fill="#d6e3ff" />
          <path d="M20 25l-3 16h30l-3-16-12 7z" fill="#8aa1c5" />
          <path d="M24 33a2.5 2.5 0 1 0 .1 0zm16 0a2.5 2.5 0 1 0 .1 0z" fill="#0c1118" />
          <path d="M30 39h4l-2 3.8z" fill="#0c1118" />
          <path d="M26.5 44h11a6 6 0 0 1-11 0z" fill="#0c1118" />
        </svg>
      </div>
    </div>

    <main class="wrap">
      <section class="hero reveal">
        <div class="hero-head">
          <p class="kicker">LINK'S UPDATE MONITOR</p>
          <span id="statusPill" class="pill idle">待初始化</span>
        </div>
        <h1>抖音更新检测台</h1>
        <p class="desc">
          规则固定：7天7条、15天15条、30天30条。到期后如果没点检测，或检测不达标，立即触发邮件提醒。
        </p>

      </section>

      <section class="panel reveal delay-1">
        <div class="panel-head">
          <h2>监测设置</h2>
        </div>

        <form id="monitorForm" class="grid" autocomplete="off">
          <label class="field full">
            <span>抖音号 / 抖音主页链接</span>
            <input
              id="douyinInput"
              type="text"
              placeholder="例如: MS4wLjAB... 或 https://www.douyin.com/user/..."
              required
            />
          </label>

          <label class="field">
            <span>违约通知邮箱</span>
            <input id="noticeEmail" type="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>规则周期</span>
            <select id="rulePlan">
              <option value="7">7天7条</option>
              <option value="15">15天15条</option>
              <option value="30" selected>30天30条</option>
            </select>
          </label>
        </form>

        <div class="actions">
          <button id="saveBtn" class="btn solid" type="button">保存状态</button>
          <button id="refreshBtn" class="btn ghost" type="button">点检测 / 刷新状态</button>
        </div>

        <div id="alertBox" class="alert hidden">
          <p id="alertText">违约提醒</p>
          <a id="alertMailLink" href="#" target="_blank" rel="noreferrer">手动发送邮件</a>
        </div>

        <p class="hint">说明：保存后配置会锁定，但“点检测”可以随时执行。</p>
      </section>

      <section class="stats reveal delay-2">
        <article class="stat-card">
          <p class="title">当前周期</p>
          <p id="cycleView" class="value">30天30条</p>
          <p id="dueTime" class="meta">到期时间：-</p>
        </article>

        <article class="stat-card">
          <p class="title">视频更新状态</p>
          <p id="progressCount" class="value">未检测</p>
          <p id="latestTime" class="meta">最近检测：-</p>
        </article>

        <article class="stat-card">
          <p class="title">通知邮箱</p>
          <p id="emailView" class="value">-</p>
          <p id="latestResult" class="meta">状态：待初始化</p>
        </article>
      </section>

      <section class="panel reveal delay-3">
        <div class="panel-head">
          <h2>运行日志</h2>
        </div>
        <pre id="logBox" class="log">[系统] 页面已就绪</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
