<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音更新检测台</title>
    <meta
      name="description"
      content="输入抖音号与通知邮箱，保存状态，按 7/15/30 天规则检测是否违约并发送提醒。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>
    <div class="side-stack left" aria-hidden="true">
      <div class="side-chip tone-dragon">
        <svg viewBox="0 0 64 64" role="img" aria-label="three-headed red dragon">
          <circle cx="32" cy="32" r="22" fill="none" stroke="#ef3a32" stroke-width="4.8" />
          <path
            d="M23 44c-2.8-4.2-2-10 2-13.4 4.1-3.5 10.2-3 13.9.9 2.7 2.8 3.5 6.8 2.4 10.3-1.3-1.6-3.1-2.7-5.1-3.3 1.3 3.8.2 7.7-2.9 10.4-3.2 2.7-7.7 3.2-11.2 1.5.8-1.6 1.2-3.7.9-5.9z"
            fill="#ef3a32"
          />
          <path d="M24.2 34.2c1.8-2 4.8-2.2 6.9-.6-2.5.4-4.4 1.6-5.8 3.6-.8-.9-.8-2.1-1.1-3z" fill="#c82222" />
          <path d="M31.8 28.8c1.4-6 4.7-10.5 10.6-13.9" stroke="#ef3a32" stroke-width="3.7" stroke-linecap="round" fill="none" />
          <path d="M30.3 27.2c-.6-6.1 1.4-11.2 6.2-15.9" stroke="#ef3a32" stroke-width="3.7" stroke-linecap="round" fill="none" />
          <path d="M27.9 28.2c-1.2-5.8-4.8-9.9-10.7-12.1" stroke="#ef3a32" stroke-width="3.7" stroke-linecap="round" fill="none" />
          <path d="M14.5 18.8l4.8-3.2 5.2.9-3.3 3.8-5.6 1.2z" fill="#ef3a32" />
          <path d="M31.2 12.9 35.8 9.8l5.4.8-3.2 3.9-5.8 1.1z" fill="#ef3a32" />
          <path d="M43.2 17.5l4.7-3 5.3 1-3.1 3.8-5.7 1z" fill="#ef3a32" />
          <circle cx="19.4" cy="17.7" r="1" fill="#fff5de" />
          <circle cx="36.1" cy="11.9" r="1" fill="#fff5de" />
          <circle cx="48.4" cy="16.4" r="1" fill="#fff5de" />
          <path d="M17.8 20.3l1.1 1.6 1.2-1.6 1.2 1.6 1.1-1.6" stroke="#fff5de" stroke-width="1.1" stroke-linecap="round" fill="none" />
          <path d="M34.5 14.3l1.1 1.6 1.2-1.6 1.2 1.6 1.1-1.6" stroke="#fff5de" stroke-width="1.1" stroke-linecap="round" fill="none" />
          <path d="M46.7 19l1.1 1.6 1.2-1.6 1.2 1.6 1.1-1.6" stroke="#fff5de" stroke-width="1.1" stroke-linecap="round" fill="none" />
          <path d="M25.8 49.3l1.8-3.2 1.4 3.2m9.6-.4 1.8-3.1 1.4 3.1" stroke="#fff5de" stroke-width="1.6" stroke-linecap="round" fill="none" />
        </svg>
      </div>
      <div class="side-chip tone-a">
        <svg viewBox="0 0 64 64" role="img" aria-label="wrench">
          <path
            d="M40.5 13.5a10.4 10.4 0 0 0-11.8 13.6L16.8 39a5.2 5.2 0 1 0 7.4 7.4l11.8-11.8a10.4 10.4 0 0 0 12-11.1l-5.8 2.5-4.7-4.7z"
            fill="#72deff"
          />
          <circle cx="20.4" cy="42.9" r="2.2" fill="#08101a" />
        </svg>
      </div>
      <div class="side-chip tone-c">
        <svg viewBox="0 0 64 64" role="img" aria-label="gear">
          <path
            d="M29.7 10h4.6l1.1 5.4a16.7 16.7 0 0 1 4.4 1.9l4.8-2.8 3.2 3.2-2.8 4.8a16.7 16.7 0 0 1 1.9 4.4L52 28v4.6l-5.4 1.1a16.7 16.7 0 0 1-1.9 4.4l2.8 4.8-3.2 3.2-4.8-2.8a16.7 16.7 0 0 1-4.4 1.9L34.3 50h-4.6l-1.1-5.4a16.7 16.7 0 0 1-4.4-1.9l-4.8 2.8-3.2-3.2 2.8-4.8a16.7 16.7 0 0 1-1.9-4.4L12 32.6V28l5.4-1.1a16.7 16.7 0 0 1 1.9-4.4l-2.8-4.8 3.2-3.2 4.8 2.8a16.7 16.7 0 0 1 4.4-1.9z"
            fill="#ff9f66"
          />
          <circle cx="32" cy="30.3" r="7.3" fill="#08101a" />
        </svg>
      </div>
      <div class="side-chip tone-c">
        <svg viewBox="0 0 64 64" role="img" aria-label="burning deer head">
          <path d="M32 9c4.3 5 7.3 8.8 7.3 13 0 2.4-1.1 4.7-3.1 6.4 4.9-.9 8.5-3.9 10.4-8.3 4.8 7.8 2.9 16.4-3.8 22.3-4.4 3.8-7.6 7.3-10.8 12.8-3.2-5.5-6.4-9-10.8-12.8-6.7-5.9-8.6-14.5-3.8-22.3 1.9 4.4 5.5 7.4 10.4 8.3-2-1.7-3.1-4-3.1-6.4 0-4.2 3-8 7.3-13z" fill="#e23a2d" />
          <path d="M32 14c2.9 3.5 4.9 6 4.9 8.6 0 1.6-.7 3.1-2 4.4 3.2-.6 5.5-2.4 6.8-5.2 3.2 5.1 1.8 10.7-2.6 14.7-2.8 2.6-4.8 5-7.1 8.7-2.3-3.7-4.3-6.1-7.1-8.7-4.4-4-5.8-9.6-2.6-14.7 1.3 2.8 3.6 4.6 6.8 5.2-1.3-1.3-2-2.8-2-4.4 0-2.6 2-5.1 4.9-8.6z" fill="#ff9f3f" />
          <path d="M25 31 14.5 11.5l3.8 1.1 3.4 6 2-7 3.6 1.1-2.6 7.2 5.8 3.5-2.7 2.4-4.5-2.4-.8 7.1z" fill="#7c8ea9" />
          <path d="M39 31 49.5 11.5l-3.8 1.1-3.4 6-2-7-3.6 1.1 2.6 7.2-5.8 3.5 2.7 2.4 4.5-2.4.8 7.1z" fill="#7c8ea9" />
          <path d="M32 26 42 31.8 38.8 47.2H25.2L22 31.8z" fill="#7c8ea9" />
          <path d="M21.3 31l5.2-4.4 2 6.3-5.4 2.1zm21.4 0-5.2-4.4-2 6.3 5.4 2.1z" fill="#9cafc8" />
          <path d="M26.2 35.2h5.2" stroke="#213043" stroke-width="2.2" stroke-linecap="round" />
          <path d="M32.6 35.2h5.2" stroke="#213043" stroke-width="2.2" stroke-linecap="round" />
          <circle cx="28.7" cy="36.9" r="1.9" fill="#1e2a3a" />
          <circle cx="35.3" cy="36.9" r="1.9" fill="#1e2a3a" />
          <path d="M30 41.1h4L32 44.3z" fill="#1e2a3a" />
          <path d="M29.2 46.2c1.8 1.4 3.8 1.4 5.6 0" stroke="#1e2a3a" stroke-width="2.1" stroke-linecap="round" fill="none" />
        </svg>
      </div>
    </div>
    <div class="side-stack right" aria-hidden="true">
      <div class="side-chip tone-b">
        <svg viewBox="0 0 64 64" role="img" aria-label="robot">
          <rect x="17" y="18" width="30" height="28" rx="8" fill="#81ffb6" />
          <rect x="21" y="22" width="22" height="14" rx="4" fill="#102218" opacity="0.4" />
          <circle cx="27.5" cy="29" r="3" fill="#0d131a" />
          <circle cx="36.5" cy="29" r="3" fill="#0d131a" />
          <rect x="25.5" y="37" width="13" height="3.4" rx="1.7" fill="#0d131a" />
          <rect x="30.5" y="12" width="3" height="7" rx="1.5" fill="#81ffb6" />
          <circle cx="32" cy="11.2" r="2.2" fill="#ff965f" />
        </svg>
      </div>
      <div class="side-chip tone-lion">
        <svg viewBox="0 0 64 64" role="img" aria-label="lannister lion head">
          <path d="M32 8c12 0 21 9 21 21s-9 27-21 27-21-15-21-27S20 8 32 8z" fill="#ba7127" />
          <circle cx="32" cy="32" r="16" fill="#e8af56" />
          <path d="M21 22l-5-8 8 2 4 7zm22 0 5-8-8 2-4 7z" fill="#d68b34" />
          <path d="M24 37c2.7-2 5.3-2 8 0m8 0c2.7-2 5.3-2 8 0" stroke="#2f1b0c" stroke-width="2.4" stroke-linecap="round" fill="none" />
          <circle cx="27.5" cy="31.5" r="2.1" fill="#2f1b0c" />
          <circle cx="36.5" cy="31.5" r="2.1" fill="#2f1b0c" />
          <path d="M29 40h6L32 44z" fill="#2f1b0c" />
          <path d="M25.5 46c4.1 3.7 8.9 3.7 13 0" stroke="#2f1b0c" stroke-width="2.6" stroke-linecap="round" fill="none" />
          <path d="M32 10l3.4 3.4L32 16.8l-3.4-3.4z" fill="#ffd081" />
        </svg>
      </div>
      <div id="wolfUnlockChip" class="side-chip tone-d unlock-chip" title="点击狼头解除配置锁定">
        <svg viewBox="0 0 64 64" role="img" aria-label="wolf head">
          <path d="M12 24l10-9 10 7 10-7 10 9-3 23H15z" fill="#d6e3ff" />
          <path d="M20 25l-3 16h30l-3-16-12 7z" fill="#8aa1c5" />
          <path d="M24 33a2.5 2.5 0 1 0 .1 0zm16 0a2.5 2.5 0 1 0 .1 0z" fill="#0c1118" />
          <path d="M30 39h4l-2 3.8z" fill="#0c1118" />
          <path d="M26.5 44h11a6 6 0 0 1-11 0z" fill="#0c1118" />
        </svg>
      </div>
    </div>

    <main class="wrap">
      <section class="hero reveal">
        <div class="hero-head">
          <p class="kicker">LINK'S UPDATE MONITOR</p>
          <span id="statusPill" class="pill idle">待初始化</span>
        </div>
        <h1>抖音更新检测台</h1>
        <p class="desc">
          规则固定：7天7条、15天15条、30天30条。到期后如果没点检测，或检测不达标，立即触发邮件提醒。
        </p>

      </section>

      <section class="panel reveal delay-1">
        <div class="panel-head">
          <h2>监测设置</h2>
        </div>

        <form id="monitorForm" class="grid" autocomplete="off">
          <label class="field full">
            <span>抖音号 / 抖音主页链接</span>
            <input
              id="douyinInput"
              type="text"
              placeholder="例如: MS4wLjAB... 或 https://www.douyin.com/user/..."
              required
            />
          </label>

          <label class="field">
            <span>违约通知邮箱</span>
            <input id="noticeEmail" type="email" placeholder="you@example.com" required />
          </label>

          <label class="field">
            <span>规则周期</span>
            <select id="rulePlan">
              <option value="7">7天7条</option>
              <option value="15">15天15条</option>
              <option value="30" selected>30天30条</option>
            </select>
          </label>
        </form>

        <div class="actions">
          <button id="saveBtn" class="btn solid" type="button">保存状态</button>
          <button id="refreshBtn" class="btn ghost" type="button">点检测 / 刷新状态</button>
        </div>

        <div id="alertBox" class="alert hidden">
          <p id="alertText">违约提醒</p>
          <a id="alertMailLink" href="#" target="_blank" rel="noreferrer">手动发送邮件</a>
        </div>

        <p class="hint">说明：保存后配置会锁定，但“点检测”可以随时执行。</p>
      </section>

      <section class="stats reveal delay-2">
        <article class="stat-card">
          <p class="title">当前周期</p>
          <p id="cycleView" class="value">30天30条</p>
          <p id="dueTime" class="meta">到期时间：-</p>
        </article>

        <article class="stat-card">
          <p class="title">视频更新状态</p>
          <p id="progressCount" class="value">未检测</p>
          <p id="latestTime" class="meta">最近检测：-</p>
        </article>

        <article class="stat-card">
          <p class="title">通知邮箱</p>
          <p id="emailView" class="value">-</p>
          <p id="latestResult" class="meta">状态：待初始化</p>
        </article>
      </section>

      <section class="panel reveal delay-3">
        <div class="panel-head">
          <h2>违约图片</h2>
        </div>
        <div class="evidence-actions">
          <input id="evidenceImageInput" type="file" accept="image/*" hidden />
          <button id="evidencePickBtn" class="btn ghost" type="button">插入图片</button>
          <button id="evidenceClearBtn" class="btn ghost danger" type="button">移除图片</button>
        </div>
        <p id="evidenceHint" class="hint">未插入图片，违约邮件只发送文字。</p>
        <div id="evidencePreview" class="evidence-preview hidden">
          <img id="evidencePreviewImg" alt="违约图片预览" />
        </div>
      </section>

      <section class="panel reveal delay-3">
        <div class="panel-head">
          <h2>运行日志</h2>
        </div>
        <pre id="logBox" class="log">[系统] 页面已就绪</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
